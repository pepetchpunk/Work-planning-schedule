  <!-- Tailwind CSS -->

  <!-- React & ReactDOM -->

  <!-- Babel for compiling JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Setup -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyA1ND18a-P7X936z0Dpc6RRY2_oXYU5_Ao",
      authDomain: "startupuprealestate-e4b0a.firebaseapp.com",
      projectId: "startupuprealestate-e4b0a",
      storageBucket: "startupuprealestate-e4b0a.firebasestorage.app",
      messagingSenderId: "966000130004",
      appId: "1:966000130004:web:5318ddaf6d2225b0cc8841",
      measurementId: "G-BP4JD5VBLZ"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // ส่งต่อฟังก์ชันของ Firebase ให้กับ React ผ่าน window object
    window.firebaseDB = db;
    window.firebaseAPI = { collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc };
    window.dispatchEvent(new Event('firebaseLoaded'));
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // --- SVG Icons Components ---
    const Icon = ({ name, size = 24, className = '', ...props }) => {
      const icons = {
        ChevronLeft: '<path d="m15 18-6-6 6-6"/>',
        ChevronRight: '<path d="m9 18 6-6-6-6"/>',
        Menu: '<line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>',
        X: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
        Sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>',
        Moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
        Plus: '<path d="M5 12h14"/><path d="M12 5v14"/>',
        CalendarIcon: '<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>',
        MapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
        FileSignature: '<path d="M20 19.5v.5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h5.5"/><path d="M8 18h1"/><path d="M18.4 9.6a2 2 0 1 1 3 3L17 17l-4 1 1-4Z"/>',
        Home: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
        Video: '<path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/>',
        ListTodo: '<rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/>',
        User: '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
        CheckSquare: '<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
        Trash: '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
        GripVertical: '<circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/>'
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: icons[name] }} {...props} />
      );
    };
    
    const ChevronLeft = (p) => <Icon name="ChevronLeft" {...p} />;
    const ChevronRight = (p) => <Icon name="ChevronRight" {...p} />;
    const Menu = (p) => <Icon name="Menu" {...p} />;
    const X = (p) => <Icon name="X" {...p} />;
    const Sun = (p) => <Icon name="Sun" {...p} />;
    const Moon = (p) => <Icon name="Moon" {...p} />;
    const Plus = (p) => <Icon name="Plus" {...p} />;
    const CalendarIcon = (p) => <Icon name="CalendarIcon" {...p} />;
    const MapPin = (p) => <Icon name="MapPin" {...p} />;
    const FileSignature = (p) => <Icon name="FileSignature" {...p} />;
    const Home = (p) => <Icon name="Home" {...p} />;
    const Video = (p) => <Icon name="Video" {...p} />;
    const ListTodo = (p) => <Icon name="ListTodo" {...p} />;
    const User = (p) => <Icon name="User" {...p} />;
    const CheckSquare = (p) => <Icon name="CheckSquare" {...p} />;
    const Trash = (p) => <Icon name="Trash" {...p} />;
    const GripVertical = (p) => <Icon name="GripVertical" {...p} />;

    // --- Constants & Data ---
    const ACTIVITIES = [
      'เปิดบ้าน', 
      'เซ็นสัญญายื่นสินกู้', 
      'เซ็นสัญญารับบ้าน', 
      'โอนบ้าน',
      'ตรวจบ้าน',
      'ถ่ายคลิปหรือคอนเทนต์', 
      'อื่นๆ'
    ];

    const MONTHS_TH = [
      'มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'
    ];
    const DAYS_TH = ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.'];

    // Generate hours and minutes for dropdowns
    const HOURS = Array.from({ length: 24 }, (_, i) => i.toString().padStart(2, '0'));
    const MINUTES = Array.from({ length: 60 }, (_, i) => i.toString().padStart(2, '0'));

    function App() {
      // --- State ---
      const [currentDate, setCurrentDate] = useState(new Date());
      const [events, setEvents] = useState([]);
      const [departments, setDepartments] = useState({
        'Marketing': ['Peth', 'Beau', 'Noey', 'Ketar', 'Perth', 'Ter'],
        'Sale': ['Boom', 'May', 'Boat']
      });
      const [selectedUser, setSelectedUser] = useState('All');
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingEventId, setEditingEventId] = useState(null);
      const [isDayViewOpen, setIsDayViewOpen] = useState(false);
      const [selectedDayString, setSelectedDayString] = useState('');
      
      // Drag & Drop State
      const [dragItemInfo, setDragItemInfo] = useState(null);
      const [dragOverInfo, setDragOverInfo] = useState(null);

      // Modal States for Add/Delete
      const [isDeleteMonthModalOpen, setIsDeleteMonthModalOpen] = useState(false);
      const [deleteMonthText, setDeleteMonthText] = useState('');
      const [isDeleteEventConfirmOpen, setIsDeleteEventConfirmOpen] = useState(false);

      // Dept & Member Modal States
      const [isAddDeptModalOpen, setIsAddDeptModalOpen] = useState(false);
      const [newDeptName, setNewDeptName] = useState('');
      const [isAddMemberModalOpen, setIsAddMemberModalOpen] = useState(false);
      const [targetDeptForMember, setTargetDeptForMember] = useState('');
      const [newMemberName, setNewMemberName] = useState('');
      
      const [isDeleteDeptModalOpen, setIsDeleteDeptModalOpen] = useState(false);
      const [deptToDelete, setDeptToDelete] = useState('');
      const [deleteDeptText, setDeleteDeptText] = useState('');

      const [isDeleteMemberModalOpen, setIsDeleteMemberModalOpen] = useState(false);
      const [memberToDelete, setMemberToDelete] = useState('');
      const [deptOfMemberToDelete, setDeptOfMemberToDelete] = useState('');
      const [deleteMemberText, setDeleteMemberText] = useState('');

      // Firebase State
      const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(false);

      // Form State
      const [formData, setFormData] = useState({
        type: 'event', // 'event', 'holiday', or 'leave'
        date: '',
        hour: '09',
        minute: '00',
        activity: ACTIVITIES[0],
        note: '',
        assignee: ''
      });

      // --- Theme Effect ---
      useEffect(() => {
        if (isDarkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [isDarkMode]);

      // --- Firebase Effect (Realtime Listen) ---
      useEffect(() => {
        if (window.firebaseDB) {
          setIsFirebaseLoaded(true);
        } else {
          const handleLoad = () => setIsFirebaseLoaded(true);
          window.addEventListener('firebaseLoaded', handleLoad);
          return () => window.removeEventListener('firebaseLoaded', handleLoad);
        }
      }, []);

      useEffect(() => {
        if (!isFirebaseLoaded) return;

        const { collection, onSnapshot, setDoc, doc } = window.firebaseAPI;
        
        // Listen to 'events'
        const unsubscribeEvents = onSnapshot(collection(window.firebaseDB, "events"), (snapshot) => {
          const loadedEvents = [];
          snapshot.forEach((doc) => {
            loadedEvents.push({ id: doc.id, ...doc.data() });
          });
          setEvents(loadedEvents);
        });

        // Listen to 'departments'
        const unsubscribeDeps = onSnapshot(collection(window.firebaseDB, "departments"), (snapshot) => {
          if (snapshot.empty) {
            // Initialize with default departments if empty
            const initial = {
              'Marketing': ['Peth', 'Beau', 'Noey', 'Ketar', 'Perth', 'Ter'],
              'Sale': ['Boom', 'May', 'Boat']
            };
            Object.keys(initial).forEach(async (key, idx) => {
              try {
                await setDoc(doc(window.firebaseDB, "departments", key), { members: initial[key], order: idx });
              } catch(e) {
                console.error("Initialize Dept Error:", e);
              }
            });
          } else {
            const loadedDeps = {};
            const depsArray = [];
            snapshot.forEach((d) => {
              depsArray.push({ id: d.id, ...d.data() });
            });
            depsArray.sort((a, b) => (a.order || 0) - (b.order || 0)).forEach(d => {
              loadedDeps[d.id] = d.members || [];
            });
            setDepartments(loadedDeps);
          }
        });

        return () => {
          unsubscribeEvents();
          unsubscribeDeps();
        };
      }, [isFirebaseLoaded]);

      // --- Drag and Drop Handlers ---
      const handleDragStart = (e, dept, memberIndex) => {
        setDragItemInfo({ dept, memberIndex });
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", memberIndex);
        }
      };

      const handleDragOver = (e, dept, memberIndex) => {
        e.preventDefault(); // allow drop
        if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
        if (dragItemInfo && dragItemInfo.dept === dept) {
          setDragOverInfo({ dept, memberIndex });
        }
      };

      const handleDrop = async (e, dept) => {
        e.preventDefault();
        if (!dragItemInfo || !dragOverInfo) return;
        if (dragItemInfo.dept !== dragOverInfo.dept || dragItemInfo.dept !== dept) return;
        
        const sourceIndex = dragItemInfo.memberIndex;
        const targetIndex = dragOverInfo.memberIndex;
        
        if (sourceIndex !== targetIndex) {
           const updatedMembers = [...departments[dept]];
           const [movedItem] = updatedMembers.splice(sourceIndex, 1);
           updatedMembers.splice(targetIndex, 0, movedItem);

           // Optimistic Update
           setDepartments(prev => ({...prev, [dept]: updatedMembers}));

           // Firebase Save
           if (isFirebaseLoaded) {
              const { updateDoc, doc } = window.firebaseAPI;
              try {
                await updateDoc(doc(window.firebaseDB, "departments", dept), { 
                  members: updatedMembers 
                });
              } catch (error) {
                console.error("Error updating member order:", error);
              }
           }
        }
        setDragItemInfo(null);
        setDragOverInfo(null);
      };

      const handleDragEnd = () => {
        setDragItemInfo(null);
        setDragOverInfo(null);
      };

      // --- Department Management Logic ---
      
      // Add Dept
      const openAddDeptModal = () => {
        setNewDeptName('');
        setIsAddDeptModalOpen(true);
      };
      
      const confirmAddDepartment = async () => {
        if (!newDeptName || !newDeptName.trim()) return;
        const name = newDeptName.trim();
        
        if (departments[name]) {
          alert('มีชื่อทีมนี้อยู่แล้วครับ!');
          return;
        }

        if (isFirebaseLoaded) {
          const { setDoc, doc } = window.firebaseAPI;
          try {
            await setDoc(doc(window.firebaseDB, "departments", name), { 
              members: [], 
              order: Object.keys(departments).length 
            });
            setIsAddDeptModalOpen(false);
          } catch (error) {
            console.error("Error adding department:", error);
            alert("เพิ่มทีมไม่สำเร็จ กรุณาตรวจสอบการเชื่อมต่อ");
          }
        }
      };

      // Add Member
      const openAddMemberModal = (deptName) => {
        setTargetDeptForMember(deptName);
        setNewMemberName('');
        setIsAddMemberModalOpen(true);
      };

      const confirmAddMember = async () => {
        if (!newMemberName || !newMemberName.trim()) return;
        const name = newMemberName.trim();
        const deptName = targetDeptForMember;
        
        if (departments[deptName] && departments[deptName].includes(name)) {
          alert('มีรายชื่อพนักงานคนนี้อยู่แล้วครับ!');
          return;
        }

        const currentMembers = departments[deptName] || [];
        const updatedMembers = [...currentMembers, name];
        
        if (isFirebaseLoaded) {
          const { updateDoc, doc } = window.firebaseAPI;
          try {
            await updateDoc(doc(window.firebaseDB, "departments", deptName), { 
              members: updatedMembers 
            });
            setIsAddMemberModalOpen(false);
          } catch (error) {
            console.error("Error adding member:", error);
            alert("เพิ่มพนักงานไม่สำเร็จ กรุณาตรวจสอบการเชื่อมต่อ");
          }
        }
      };

      // Delete Dept
      const openDeleteDeptModal = (deptName) => {
        setDeptToDelete(deptName);
        setDeleteDeptText('');
        setIsDeleteDeptModalOpen(true);
      };

      const confirmDeleteDepartment = async () => {
        if (deleteDeptText !== 'Delete') return;
        const deptName = deptToDelete;
        
        if (isFirebaseLoaded) {
          const { doc, deleteDoc } = window.firebaseAPI;
          try {
            await deleteDoc(doc(window.firebaseDB, "departments", deptName));
            if (selectedUser === deptName || (departments[deptName] && departments[deptName].includes(selectedUser))) {
              setSelectedUser('All');
            }
            setIsDeleteDeptModalOpen(false);
          } catch (error) {
            console.error("Error deleting department", error);
            alert("ไม่สามารถลบทีมได้");
          }
        }
      };

      // Delete Member
      const openDeleteMemberModal = (deptName, memberName) => {
        setDeptOfMemberToDelete(deptName);
        setMemberToDelete(memberName);
        setDeleteMemberText('');
        setIsDeleteMemberModalOpen(true);
      };

      const confirmDeleteMember = async () => {
        if (deleteMemberText !== 'Delete') return;
        const deptName = deptOfMemberToDelete;
        const memberName = memberToDelete;
        
        if (isFirebaseLoaded) {
          const currentMembers = departments[deptName] || [];
          const updatedMembers = currentMembers.filter(name => name !== memberName);
          const { doc, updateDoc } = window.firebaseAPI;
          try {
            await updateDoc(doc(window.firebaseDB, "departments", deptName), { 
              members: updatedMembers 
            });
            if (selectedUser === memberName) {
              setSelectedUser('All');
            }
            setIsDeleteMemberModalOpen(false);
          } catch (error) {
            console.error("Error deleting member", error);
            alert("ไม่สามารถลบพนักงานได้");
          }
        }
      };

      // --- Calendar Logic ---
      const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
      const getFirstDayOfMonth = (year, month) => {
        const day = new Date(year, month, 1).getDay();
        return (day + 6) % 7; // Shift so Monday is 0, Sunday is 6
      };

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const daysInMonth = getDaysInMonth(year, month);
      const firstDay = getFirstDayOfMonth(year, month);

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
      const goToToday = () => setCurrentDate(new Date());

      // --- Helper to get events for a specific day ---
      const getEventsForDay = (dateStr) => {
        const dayData = events.filter(ev => ev.date === dateStr);
        const filteredEvents = dayData.filter(ev => {
          if (selectedUser === 'Holidays') {
            return ev.type === 'holiday' || ev.type === 'leave' || ev.type === 'public_holiday';
          }
          if (ev.type === 'holiday' || ev.type === 'leave' || ev.type === 'public_holiday') {
            return selectedUser !== 'All' && ev.assignee === selectedUser;
          }
          return selectedUser === 'All' || ev.assignee === selectedUser;
        });
        
        const normalEvents = filteredEvents.filter(ev => ev.type === 'event').sort((a, b) => a.time.localeCompare(b.time));
        const holidays = filteredEvents.filter(ev => ev.type === 'holiday');
        const leaves = filteredEvents.filter(ev => ev.type === 'leave');
        const publicHolidays = filteredEvents.filter(ev => ev.type === 'public_holiday');
        return { normalEvents, holidays, leaves, publicHolidays };
      };

      // --- Event Handling ---
      const handleDayClick = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const { normalEvents, holidays, leaves, publicHolidays } = getEventsForDay(dateStr);
        
        if (normalEvents.length > 0 || holidays.length > 0 || leaves.length > 0 || (publicHolidays && publicHolidays.length > 0)) {
          setSelectedDayString(dateStr);
          setIsDayViewOpen(true);
        } else {
          handleOpenModal(day);
        }
      };

      const handleOpenModal = (day = null, eventToEdit = null, prefillAssignee = null, prefillType = 'event') => {
        if (eventToEdit) {
          setFormData({
            type: eventToEdit.type || 'event',
            date: eventToEdit.date,
            hour: eventToEdit.time ? eventToEdit.time.split(':')[0] : '09',
            minute: eventToEdit.time ? eventToEdit.time.split(':')[1] : '00',
            activity: eventToEdit.activity || ACTIVITIES[0],
            note: eventToEdit.note || '',
            assignee: eventToEdit.assignee
          });
          setEditingEventId(eventToEdit.id);
          setIsModalOpen(true);
          return;
        }

        let dateStr = '';
        if (day) {
          dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        } else if (selectedDayString) {
          dateStr = selectedDayString;
        } else {
          const today = new Date();
          dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }
        
        let initialType = prefillType;
        if (selectedUser === 'Holidays' && prefillType === 'event') {
          initialType = 'holiday';
        }

        const firstDept = Object.values(departments)[0];
        const defaultAssignee = firstDept && firstDept.length > 0 ? firstDept[0] : '';

        setFormData({
          ...formData,
          type: initialType,
          date: dateStr,
          assignee: prefillAssignee ? prefillAssignee : (selectedUser !== 'All' && selectedUser !== 'Holidays' ? selectedUser : defaultAssignee)
        });
        setEditingEventId(null);
        setIsModalOpen(true);
      };

      const handleCloseModal = () => {
        setIsModalOpen(false);
        setEditingEventId(null);
        setSelectedDayString('');
        
        const firstDept = Object.values(departments)[0];
        const defaultAssignee = firstDept && firstDept.length > 0 ? firstDept[0] : '';
        
        setFormData({
          type: 'event', date: '', hour: '09', minute: '00', activity: ACTIVITIES[0], note: '', assignee: defaultAssignee
        });
      };

      const handleSaveEvent = async (e) => {
        e.preventDefault();
        if (!isFirebaseLoaded) return;

        const eventData = {
          ...formData,
          time: (formData.type === 'holiday' || formData.type === 'leave' || formData.type === 'public_holiday') ? '' : `${formData.hour}:${formData.minute}`,
          activity: formData.type === 'holiday' ? 'วันหยุด' : formData.type === 'leave' ? 'วันลางาน' : formData.type === 'public_holiday' ? 'นักขัตฤกษ์' : formData.activity
        };
        
        const { collection, addDoc, updateDoc, doc } = window.firebaseAPI;

        try {
          if (editingEventId) {
            await updateDoc(doc(window.firebaseDB, "events", editingEventId), eventData);
          } else {
            await addDoc(collection(window.firebaseDB, "events"), eventData);
          }
        } catch (error) {
          console.error("Error writing to database", error);

        const eventsToDelete = events.filter(ev => ev.date.startsWith(monthPrefix));
        
        const { doc, deleteDoc } = window.firebaseAPI;

          await Promise.all(eventsToDelete.map(ev => deleteDoc(doc(window.firebaseDB, "events", ev.id))));

                        className="w-4 h-4 text-red-600 bg-gray-100 border-gray-300 focus:ring-red-500 dark:focus:ring-red-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" 
                      />
                      <span className="text-sm font-medium text-gray-900 dark:text-gray-300">วันหยุด (Holiday)</span>
                    </label>
                    <label className="flex items-center space-x-2 cursor-pointer">
                      <input 
                        type="radio" 
                        name="eventType"
                        checked={formData.type === 'leave'} 
                        onChange={() => setFormData({...formData, type: 'leave'})} 
                        className="w-4 h-4 text-orange-600 bg-gray-100 border-gray-300 focus:ring-orange-500 dark:focus:ring-orange-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" 
                      />
                      <span className="text-sm font-medium text-gray-900 dark:text-gray-300">วันลางาน (Leave)</span>
                    </label>
                    <label className="flex items-center space-x-2 cursor-pointer">
                      <input 
                        type="radio" 
                        name="eventType"
                        checked={formData.type === 'public_holiday'} 
                        onChange={() => setFormData({...formData, type: 'public_holiday'})} 
                        className="w-4 h-4 text-yellow-500 bg-gray-100 border-gray-300 focus:ring-yellow-500 dark:focus:ring-yellow-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" 
                      />
                      <span className="text-sm font-medium text-gray-900 dark:text-gray-300">นักขัตฤกษ์</span>
                    </label>
                  </div>

                  {/* Date & Assignee Row */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">วันที่</label>
                      <input 
                        type="date" 
                        required
                        value={formData.date}
                        onChange={(e) => setFormData({...formData, date: e.target.value})}
                        className="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-[#0b3d1b] focus:border-[#0b3d1b] dark:focus:ring-[#4ade80] dark:focus:border-[#4ade80] outline-none transition-all dark:text-white"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">ผู้รับผิดชอบ</label>
                      <select 
                        value={formData.assignee}
                        onChange={(e) => setFormData({...formData, assignee: e.target.value})}
                        className="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-[#0b3d1b] focus:border-[#0b3d1b] dark:focus:ring-[#4ade80] dark:focus:border-[#4ade80] outline-none transition-all dark:text-white"
                      >
                        {Object.entries(departments).map(([dept, members]) => (
                          <optgroup key={dept} label={dept}>
                            {members.map(name => <option key={name} value={name}>{name}</option>)}
                          </optgroup>
                        ))}
                      </select>
                    </div>
                  </div>

                  {/* Conditional Fields based on Type */}
                  {formData.type === 'event' && (
                    <>
                      {/* Time Dropdowns */}
                      <div>
                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">เวลา (ชั่วโมง : นาที)</label>
                        <div className="flex items-center space-x-3">
                          <select 
                            value={formData.hour}
                            onChange={(e) => setFormData({...formData, hour: e.target.value})}
                            className="flex-1 px-4 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-[#0b3d1b] focus:border-[#0b3d1b] dark:focus:ring-[#4ade80] dark:focus:border-[#4ade80] outline-none transition-all dark:text-white"
                          >
                            {HOURS.map(h => <option key={`h-${h}`} value={h}>{h}</option>)}
                          </select>
                          <span className="text-xl font-bold text-gray-400">:</span>
                          <select 
                            value={formData.minute}
                            onChange={(e) => setFormData({...formData, minute: e.target.value})}
                            className="flex-1 px-4 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-[#0b3d1b] focus:border-[#0b3d1b] dark:focus:ring-[#4ade80] dark:focus:border-[#4ade80] outline-none transition-all dark:text-white"
                          >
                            {MINUTES.map(m => <option key={`m-${m}`} value={m}>{m}</option>)}
                          </select>
                        </div>
                      </div>

                      {/* Activity Dropdown */}
                      <div>
                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">สิ่งที่ต้องทำ</label>
                        <div className="relative">
                          <select 
                            value={formData.activity}
                            onChange={(e) => setFormData({...formData, activity: e.target.value})}
                            className="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-[#0b3d1b] focus:border-[#0b3d1b] dark:focus:ring-[#4ade80] dark:focus:border-[#4ade80] outline-none transition-all appearance-none dark:text-white pr-10"
                          >
                            {ACTIVITIES.map(act => (
                              <option key={act} value={act}>{act}</option>
                            ))}
                          </select>
                          <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <ListTodo size={18} />
                          </div>
                        </div>
                      </div>
                    </>
                  )}

                  {/* Note / Details */}
                  <div>
                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
                      หมายเหตุ / รายละเอียดเพิ่มเติม
                    </label>
                    <textarea 
                      rows="3"
                      value={formData.note}
                      onChange={(e) => setFormData({...formData, note: e.target.value})}
                      placeholder={formData.type === 'holiday' || formData.type === 'leave' ? "กรุณาระบุรายละเอียด" : "กรุณาระบุรายละเอียด"}
                      className="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-[#0b3d1b] focus:border-[#0b3d1b] dark:focus:ring-[#4ade80] dark:focus:border-[#4ade80] outline-none transition-all resize-none dark:text-white"
                    ></textarea>
                  </div>

                  <div className="pt-4 flex justify-between space-x-3 border-t border-gray-200 dark:border-gray-800">
                    <div>
                      {editingEventId && (
                        <button 
                          type="button" 
                          onClick={() => setIsDeleteEventConfirmOpen(true)}
                          className="px-5 py-2.5 rounded-xl text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 font-medium transition-colors"
                        >
                          ลบข้อมูล
                        </button>
                      )}
                    </div>
                    <div className="flex space-x-3">
                      <button 
                        type="button" 
                        onClick={handleCloseModal}
                        className="px-5 py-2.5 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 font-medium transition-colors"
                      >
                        ยกเลิก
                      </button>
                      <button 
                        type="submit"
                        className={`px-6 py-2.5 rounded-xl text-white font-medium transition-colors shadow-sm flex items-center ${formData.type === 'public_holiday' ? 'bg-yellow-500 hover:bg-yellow-600 shadow-yellow-500/30' : formData.type === 'holiday' ? 'bg-red-600 hover:bg-red-700 shadow-red-600/30' : formData.type === 'leave' ? 'bg-orange-600 hover:bg-orange-700 shadow-orange-600/30' : 'bg-[#0b3d1b] hover:bg-[#0b3d1b]/90 shadow-[#0b3d1b]/30'}`}
                      >
                        <Plus size={18} className="mr-2" />
                        บันทึกข้อมูล
                      </button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Global Styles for Custom Scrollbar & Animations */}
          <style dangerouslySetInnerHTML={{__html: `
            .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 8px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
            .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.5); }
            
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
            .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
          `}} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
